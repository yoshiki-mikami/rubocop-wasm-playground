<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuboCop on WASM</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>RuboCop on WASM</h1>
  <textarea id="code" placeholder="Rubyコードをここに入力してください..."></textarea>
  <br>
  <button id="run-btn">RuboCop を実行</button>
  <div id="output"></div>

  <div id="loading-overlay">
    <div id="loading-box">
      <div id="loading-spinner"></div>
      <p>RuboCop を読み込み中...</p>
      <p id="loading-sub">初回は少し時間がかかります</p>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
